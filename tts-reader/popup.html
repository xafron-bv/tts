<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>TTS Reader</h1>
    <span class="status" id="status">Not connected</span>
  </div>

  <div class="field">
    <label>WebSocket URL</label>
    <textarea id="wsUrl" rows="2" placeholder="Auto-captured from NaturalReaders, or paste manually"></textarea>
    <small>Visit <a href="https://www.naturalreaders.com" target="_blank">naturalreaders.com</a> and play any voice to auto-capture</small>
  </div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com">
  </div>

  <div class="row">
    <div class="field flex1">
      <label>Voice</label>
      <input type="text" id="voice" placeholder="auto-captured">
    </div>
    <div class="field flex1">
      <label>Speed: <span id="speedLabel">1.5x</span></label>
      <input type="range" id="speed" min="0.5" max="3" step="0.25" value="1.5">
    </div>
  </div>

  <div class="field">
    <label>Reading Style</label>
    <textarea id="instructions" rows="2" placeholder="e.g. friendly, calm, engaging tone">friendly, calm, engaging tone for elearning</textarea>
  </div>

  <div class="actions">
    <button id="save" class="btn secondary">Save Settings</button>
    <button id="start" class="btn primary">Start Reading</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
